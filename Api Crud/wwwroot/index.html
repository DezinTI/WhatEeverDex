<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DzDex | WhateverDex</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <div class="page-shell">
        <header class="hero-card">
            <div>
                <p class="eyebrow">WhateverDex</p>
                <h1>DzDex</h1>
                <p class="hero-copy">Gerencie registros, categorias e autoria com autenticação real.</p>
            </div>
            <div class="header-actions">
                <div id="userBadge" class="user-badge"></div>
                <a id="adminLink" class="secondary-link hidden" href="/admin.html">Administração</a>
                <button id="logoutBtn" type="button" class="ghost-btn">Sair</button>
            </div>
        </header>

        <section class="content-card toolbar-card">
            <input type="text" id="filtroInput" placeholder="Buscar por nome, tipo ou descrição...">
            <select id="tipoFiltro">
                <option value="">Todos os tipos</option>
            </select>
            <button id="atualizarBtn">Atualizar Lista</button>
        </section>

        <section class="content-card">
            <h2>Registros</h2>
            <div id="cardsContainer" class="cards-grid"></div>
        </section>

        <section class="content-card panel-card">
            <h2>Novo Registro</h2>
            <form id="novoMonstroForm" class="form-grid">
                <input id="nome" placeholder="Nome" required>
                <div class="categoria-inline">
                    <input id="novaCategoria" placeholder="Nova categoria (ex: meme-anime)">
                    <button type="button" id="criarCategoriaBtn">Cadastrar categoria</button>
                </div>
                <select id="tipo" required>
                    <option value="">Selecione o tipo</option>
                </select>
                <input id="videoYoutubeUrl" placeholder="Link do YouTube" required>
                <input id="imagemArquivo" type="file" accept="image/*">
                <input id="imagemUrl" placeholder="ou URL da imagem">
                <textarea id="descricao" placeholder="Descrição"></textarea>
                <button type="submit">Salvar Registro</button>
            </form>
        </section>

        <section class="content-card">
            <div class="section-heading">
                <h2>Categorias</h2>
                <p>Edite ou exclua categorias sem registros vinculados.</p>
            </div>
            <div id="categoriasLista" class="category-list"></div>
        </section>
    </div>

    <div id="detalhesModal" class="modal">
        <div class="modal-content">
            <button id="fecharModal" class="close-btn">×</button>
            <div id="detalhesConteudo"></div>
        </div>
    </div>

    <div id="edicaoModal" class="modal">
        <div class="modal-content">
            <button id="fecharEdicaoModal" class="close-btn">×</button>
            <div class="section-heading">
                <h3 id="edicaoTitulo">Editar registro</h3>
                <p id="edicaoSubtitulo">Admins aplicam na hora. Usuários enviam para aprovação.</p>
            </div>
            <form id="edicaoForm" class="form-grid modal-form">
                <input id="editId" type="hidden">
                <label>
                    <span>Nome</span>
                    <input id="editNome" required>
                </label>
                <label>
                    <span>Descrição</span>
                    <textarea id="editDescricao" rows="5"></textarea>
                </label>
                <button id="salvarEdicaoBtn" type="submit">Salvar</button>
            </form>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>

</html>
